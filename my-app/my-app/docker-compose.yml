services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ami-admin-2026}
    volumes:
      # Persist CMS data across container restarts
      - ami-data:/app/data
      # Persist uploaded images
      - ami-public:/app/public/images
    restart: unless-stopped

volumes:
  ami-data:
  ami-public:
